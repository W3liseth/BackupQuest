name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, par exemple v1.0.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  release-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Build and publish release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          BACKUPQUEST_GOOGLE_CLIENT_ID: ${{ secrets.BACKUPQUEST_GOOGLE_CLIENT_ID }}
          BACKUPQUEST_GOOGLE_CLIENT_SECRET: ${{ secrets.BACKUPQUEST_GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: ${{ steps.release.outputs.tag }}
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
