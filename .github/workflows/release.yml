name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, par exemple v1.0.0"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  release-windows:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        id: release
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Validate release secrets
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          BACKUPQUEST_GOOGLE_CLIENT_ID: ${{ secrets.BACKUPQUEST_GOOGLE_CLIENT_ID }}
          BACKUPQUEST_GOOGLE_CLIENT_SECRET: ${{ secrets.BACKUPQUEST_GOOGLE_CLIENT_SECRET }}
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) { $missing += "TAURI_SIGNING_PRIVATE_KEY" }
          if ([string]::IsNullOrWhiteSpace($env:BACKUPQUEST_GOOGLE_CLIENT_ID)) { $missing += "BACKUPQUEST_GOOGLE_CLIENT_ID" }
          if ([string]::IsNullOrWhiteSpace($env:BACKUPQUEST_GOOGLE_CLIENT_SECRET)) { $missing += "BACKUPQUEST_GOOGLE_CLIENT_SECRET" }
          if ($missing.Count -gt 0) {
            throw "Secrets GitHub manquants: $($missing -join ', ')"
          }

      - name: Build and publish release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          BACKUPQUEST_GOOGLE_CLIENT_ID: ${{ secrets.BACKUPQUEST_GOOGLE_CLIENT_ID }}
          BACKUPQUEST_GOOGLE_CLIENT_SECRET: ${{ secrets.BACKUPQUEST_GOOGLE_CLIENT_SECRET }}
        with:
          tagName: ${{ steps.release.outputs.tag }}
          releaseName: ${{ steps.release.outputs.tag }}
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          args: --bundles msi
          releaseAssetNamePattern: "[name]_[version]_[arch][ext]"

      - name: Publish updater manifest
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.release.outputs.tag }}"
          $version = $tag.TrimStart("v")
          $bundleDir = "src-tauri/target/release/bundle/msi"
          $msi = Get-ChildItem $bundleDir -Filter "*.msi" | Sort-Object LastWriteTime -Descending | Select-Object -First 1

          if (-not $msi) {
            throw "MSI introuvable dans $bundleDir."
          }

          $signaturePath = "$($msi.FullName).sig"
          if (-not (Test-Path $signaturePath)) {
            throw "Signature updater introuvable: $signaturePath"
          }

          $signature = (Get-Content $signaturePath -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($signature)) {
            throw "Signature updater vide: $signaturePath"
          }

          $assetName = "BackupQuest_${version}_x64.msi"
          $normalizedMsiPath = Join-Path $bundleDir $assetName
          $normalizedSignaturePath = "$normalizedMsiPath.sig"

          if ($msi.FullName -ne $normalizedMsiPath) {
            Copy-Item -LiteralPath $msi.FullName -Destination $normalizedMsiPath -Force
            Copy-Item -LiteralPath $signaturePath -Destination $normalizedSignaturePath -Force
          }

          gh release upload $tag $normalizedMsiPath $normalizedSignaturePath --clobber

          if ($msi.Name -ne $assetName) {
            $releaseAssetNames = @(gh release view $tag --json assets --jq ".assets[].name")
            if ($releaseAssetNames -contains $msi.Name) {
              gh release delete-asset $tag $msi.Name --yes
            }
            if ($releaseAssetNames -contains "$($msi.Name).sig") {
              gh release delete-asset $tag "$($msi.Name).sig" --yes
            }
          }

          $assetUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/$assetName"
          $releaseNotes = gh release view $tag --json body --jq ".body"
          if ([string]::IsNullOrWhiteSpace($releaseNotes)) {
            $releaseNotes = "Voir les notes de version sur GitHub."
          }

          $latest = [ordered]@{
            version = $version
            notes = $releaseNotes
            pub_date = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            platforms = [ordered]@{
              "windows-x86_64" = [ordered]@{
                signature = $signature
                url = $assetUrl
              }
            }
          }

          $latest | ConvertTo-Json -Depth 10 | Set-Content latest.json -Encoding UTF8
          gh release upload $tag latest.json --clobber
